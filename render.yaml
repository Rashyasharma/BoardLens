services:
  - type: web
    name: boardlens-app
    env: docker
    plan: free
    healthCheckPath: /
    envVars:
      - key: APP_NAME
        value: BoardLens
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        generateValue: true
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: boardlens-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: boardlens-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: boardlens-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: boardlens-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: boardlens-db
          property: password

databases:
  - name: boardlens-db
    databaseName: boardlens
    user: boardlens_user
    plan: free
